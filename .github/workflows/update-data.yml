---
name: Update Fire Stats CSV
concurrency:
  group: fire-stats
  cancel-in-progress: false
on:
  workflow_dispatch: null
  schedule:
    - cron: 23 */4 * * *
jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
      - name: Update charts
        env:
          URL_BASE: ${{secrets.URL_BASE}}
          TOKEN: ${{ secrets.TOKEN }}
        run: python scrape.py & python scrape-by-agency.py & wait
